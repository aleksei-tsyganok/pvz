}

const EXP_CATS=[
  {v:'rent_util',l:'Аренда+коммуналка'},
  {v:'salary',l:'Зарплата'},
  {v:'internet',l:'Интернет'},
  {v:'cameras',l:'Камеры'},
  {v:'supplies',l:'Канцелярия/хоз/ремонт'},
];

function buildExpCats(pid){
  const p=pts.find(x=>x.id===pid);
  if(!p)return;

  // Загружаем существующие расходы за этот месяц для этого пункта
  const existing={};
  const existingNotes={};
  allExp.filter(e=>e.point_id===pid&&Number(e._month)===expM&&Number(e._year)===expY).forEach(e=>{
    existing[e.category]=(existing[e.category]||0)+Number(e.amount);
    existingNotes[e.category]=e.notes||'';
  });
  // Также загружаем вычеты из доходов (deduct-записи в allInc с отрицательной суммой)
  allInc.filter(e=>e.point_id===pid&&Number(e._month)===expM&&Number(e._year)===expY&&e.notes&&e.notes.startsWith('deduct:')).forEach(e=>{
    existing[e.category]=(existing[e.category]||0)+Math.abs(Number(e.amount));
    existingNotes[e.category]=e.notes.replace('deduct:','')||'';
  });

  let h=`<div style="padding:12px 20px 6px;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:8px">
    <span class="mt ${p.marketplace==='yandex'?'my':p.marketplace==='ozon'?'mo':'mw'}" style="font-size:9px">${p.marketplace.toUpperCase()}</span>
    <span class="gbadge b${p.owner_group}" style="font-size:9px">${p.owner_group}</span>
    <span style="font-size:14px;font-weight:600;color:var(--tx)">${p.address}</span>
  </div>`;

  // Дополнительные расходные категории (добавленные пользователем + те у которых есть deduct-данные)
  const deductCatsInDb=allInc
    .filter(e=>e.point_id===pid&&Number(e._month)===expM&&Number(e._year)===expY&&e.notes&&e.notes.startsWith('deduct:'))
    .map(e=>({v:e.category,l:CL[e.category]||e.category}));
  const savedExtra=(window._extraExpCats&&window._extraExpCats[pid])||[];
  const extraExpCats=[...savedExtra,...deductCatsInDb.filter(d=>!savedExtra.find(s=>s.v===d.v))];
  const allExpCats = [...EXP_CATS, ...extraExpCats];

  allExpCats.forEach(cat=>{
    const existVal=existing[cat.v]||0;
    const noteStr=existingNotes[cat.v]||'';
    const parts=noteStr&&noteStr.includes('+')?noteStr.split('+').filter(x=>x.trim()):[existVal?String(Math.round(existVal)):''];
    const isExtra=!EXP_CATS.find(c=>c.v===cat.v);

    h+=`<div class="exp-cat-block" data-cat="${cat.v}" data-pid="${pid}">
      <div class="exp-cat-head">
        <span class="exp-cat-name">${cat.l}${isExtra?'<span style="font-size:9px;color:var(--mu);margin-left:4px">доп.</span>':''}</span>
        <div style="display:flex;align-items:center;gap:8px">
          ${isExtra?`<button onclick="removeExtraExpCat('${pid}','${cat.v}')" style="background:none;border:none;color:var(--mu);cursor:pointer;font-size:14px;padding:0 2px">×</button>`:''}
          <span class="exp-cat-total" id="exp-total-${cat.v}" style="color:${isExtra?'var(--rd)':'var(--mu2)'}">${existVal?'−'+fmt(Math.abs(existVal)):'—'}</span>
        </div>
      </div>
      <div class="exp-inputs" id="exp-inputs-${cat.v}">
        ${parts.map((v,i)=>`
          <div class="exp-input-row">
            ${i>0?'<span class="exp-plus">+</span>':'<span class="exp-plus-placeholder"></span>'}
            <input type="number" min="0" step="1" placeholder="0 ₽"
              class="exp-num-inp" value="${v||''}"
              oninput="calcExpCat('${cat.v}')"
              onkeydown="expInputKey(event,'${cat.v}',${i})"
              style="flex:1"/>
            ${parts.length>1||v?`<button class="exp-del-btn" onclick="delExpRow('${cat.v}',${i})">×</button>`:''}
          </div>`).join('')}
      </div>
      <button class="exp-add-row-btn" onclick="addExpRow('${cat.v}')">+ добавить</button>
    </div>`;
  });

  // Кнопка добавления доп. категории расходов
  const availableCats = CATS.filter(c=>!allExpCats.find(e=>e.v===c.v));
  h+=`<div style="padding:10px 20px 6px">
    <div style="position:relative">
      <button onclick="toggleExpCatPicker('${pid}')" class="exp-add-row-btn" style="border-style:solid;border-color:rgba(192,57,43,.4);color:var(--rd);width:auto;padding:7px 16px">
        + Добавить категорию расходов
      </button>
      <div id="exp-cat-picker-${pid}" style="display:none;position:absolute;left:0;top:calc(100% + 6px);z-index:100;
        background:var(--bg3);border:1px solid var(--b2);border-radius:12px;padding:8px;
        min-width:240px;max-height:280px;overflow-y:auto;
        box-shadow:0 8px 24px rgba(0,0,0,.5)">
        <div style="font-size:10px;color:var(--mu);padding:4px 8px 8px;font-weight:600;text-transform:uppercase;letter-spacing:.06em">Выберите категорию</div>
        ${availableCats.map(c=>`
          <button onclick="addExtraExpCat('${pid}','${c.v}','${c.l}')"
            style="display:block;width:100%;text-align:left;padding:8px 12px;background:none;border:none;
            color:var(--tx);font-size:13px;cursor:pointer;border-radius:8px;transition:background .1s"
            onmouseover="this.style.background='rgba(255,255,255,.06)'"
            onmouseout="this.style.background='none'">
            <span style="font-size:10px;color:var(--mu);display:block;margin-bottom:1px">вычет из дохода</span>
            ${c.l}
          </button>`).join('')}
      </div>
    </div>
  </div>`;

  document.getElementById('exp-cats-wrap').innerHTML=h;
  document.getElementById('exp-cats-wrap').style.display='block';
  document.getElementById('exp-foot').style.display='flex';
  calcExpTotal();
}

function toggleExpCatPicker(pid){
  const picker=document.getElementById('exp-cat-picker-'+pid);
  if(!picker)return;
  picker.style.display=picker.style.display==='none'?'block':'none';
  // Закрываем при клике вне
  if(picker.style.display==='block'){
    setTimeout(()=>{
      document.addEventListener('click',function closePicker(e){
        if(!picker.contains(e.target)){picker.style.display='none';document.removeEventListener('click',closePicker);}
      });
    },100);
  }
}

function addExtraExpCat(pid, catV, catL){
  if(!window._extraExpCats) window._extraExpCats={};
  if(!window._extraExpCats[pid]) window._extraExpCats[pid]=[];
  if(!window._extraExpCats[pid].find(c=>c.v===catV)){
    window._extraExpCats[pid].push({v:catV,l:catL});
  }
  buildExpCats(pid);
}

function removeExtraExpCat(pid, catV){
  if(!window._extraExpCats||!window._extraExpCats[pid])return;
  window._extraExpCats[pid]=window._extraExpCats[pid].filter(c=>c.v!==catV);
  buildExpCats(pid);
}

// addExpRow and other expense helpers below

function addExpRow(catV){
  const wrap=document.getElementById('exp-inputs-'+catV);
  const rows=wrap.querySelectorAll('.exp-input-row');
  const div=document.createElement('div');
  div.className='exp-input-row';
  div.innerHTML=`<span class="exp-plus">+</span>
    <input type="number" min="0" step="1" placeholder="0 ₽"
      class="exp-num-inp"
      oninput="calcExpCat('${catV}')"
      onkeydown="expInputKey(event,'${catV}',${rows.length})"
      style="flex:1"/>
    <button class="exp-del-btn" onclick="this.closest('.exp-input-row').remove();calcExpCat('${catV}')">×</button>`;
  wrap.appendChild(div);
  div.querySelector('input').focus();
  calcExpCat(catV);
}

function delExpRow(catV, idx){
  const wrap=document.getElementById('exp-inputs-'+catV);
  const rows=wrap.querySelectorAll('.exp-input-row');
  if(rows[idx]) rows[idx].remove();
  calcExpCat(catV);
}

function expInputKey(e, catV, idx){
  if(e.key==='Enter'){e.preventDefault();addExpRow(catV);}
}

function calcExpCat(catV){
  const wrap=document.getElementById('exp-inputs-'+catV);
  const vals=Array.from(wrap.querySelectorAll('.exp-num-inp')).map(i=>parseFloat(i.value)||0);
  const total=vals.reduce((s,v)=>s+v,0);
  const el=document.getElementById('exp-total-'+catV);
  if(el) el.textContent=total?fmt(total):'—';
  el.style.color=total?'var(--rd)':'var(--mu2)';
  calcExpTotal();
}

function calcExpTotal(){
  let total=0;
  EXP_CATS.forEach(cat=>{
    const wrap=document.getElementById('exp-inputs-'+cat.v);
    if(!wrap)return;
    Array.from(wrap.querySelectorAll('.exp-num-inp')).forEach(i=>total+=parseFloat(i.value)||0);
  });
  const el=document.getElementById('exp-tot-val');
  if(el) el.textContent=fmt(total);
}

async function saveExpenses(){
  if(!selExpPt){toast('Выберите пункт');return;}
  const btn=document.getElementById('exp-save-btn');
  btn.disabled=true;btn.textContent='Сохранение...';

  try{
    // Получаем или создаём month_id
    let {data:mRow}=await db.from('months').select('id').eq('year',expY).eq('month',expM).maybeSingle();
    if(!mRow){
      const {data:ins}=await db.from('months').insert({year:expY,month:expM}).select('id').single();
      mRow=ins;
    }
    const mid2=mRow.id;
    const date=expY+'-'+String(expM).padStart(2,'0')+'-01';
    const rows=[];

    const extraExpCats2=(window._extraExpCats&&window._extraExpCats[selExpPt])||[];
    // Также берём категории которые появились автоматически из deduct-данных в базе
    const deductCatsAuto=allInc
      .filter(e=>e.point_id===selExpPt&&Number(e._month)===expM&&Number(e._year)===expY&&e.notes&&e.notes.startsWith('deduct:'))
      .map(e=>({v:e.category,l:CL[e.category]||e.category}))
      .filter((d,i,arr)=>arr.findIndex(x=>x.v===d.v)===i); // уникальные
    const allExtraKeys=new Set([...extraExpCats2,...deductCatsAuto].map(c=>c.v));
    const extraExpKeys=allExtraKeys;
    const allExpCatsToSave=[...EXP_CATS,...extraExpCats2,...deductCatsAuto.filter(d=>!extraExpCats2.find(e=>e.v===d.v))];
    const incDeductRows=[]; // вычеты из доходов — сохраняются в income_entries с минусом
    allExpCatsToSave.forEach(cat=>{
      const wrap=document.getElementById('exp-inputs-'+cat.v);
      if(!wrap)return;
      const vals=Array.from(wrap.querySelectorAll('.exp-num-inp')).map(i=>parseFloat(i.value)||0).filter(v=>v>0);
      if(!vals.length)return;
      const total=vals.reduce((s,v)=>s+v,0);
      const notes=vals.length>1?vals.join('+'):'';
      if(extraExpKeys.has(cat.v)){
        // Доп. категория — вычет из дохода (income_entries с отрицательной суммой)
        const deductCat=CATS.find(c=>c.v===cat.v);
        incDeductRows.push({point_id:selExpPt,month_id:mid2,category:cat.v,label:cat.l,amount:-total,entry_date:date,tax_exempt:deductCat?.taxExempt||false,notes:'deduct:'+notes});
      } else {
        rows.push({point_id:selExpPt,month_id:mid2,category:cat.v,label:cat.l,amount:total,entry_date:date,notes});
      }
    });

    if(!rows.length){toast('Нет сумм');btn.disabled=false;btn.textContent='Сохранить';return;}

    // Удаляем старые и вставляем новые
    const cats=rows.map(r=>r.category);
    await db.from('expense_entries').delete().eq('month_id',mid2).eq('point_id',selExpPt).in('category',cats);
    if(rows.length) await db.from('expense_entries').insert(rows);
    // Сохраняем вычеты из доходов
    if(incDeductRows.length){
      const deductCats=incDeductRows.map(r=>r.category);
      // Удаляем только deduct-записи (с notes начинающимися на 'deduct:')
      const {data:oldDeducts}=await db.from('income_entries')
        .select('id').eq('month_id',mid2).eq('point_id',selExpPt).in('category',deductCats);
      if(oldDeducts&&oldDeducts.length){
        const deductIds=oldDeducts.map(r=>r.id);
        await db.from('income_entries').delete().in('id',deductIds);
      }
      await db.from('income_entries').insert(incDeductRows);
    }

    toast('✓ Расходы сохранены');
    await refreshAllData();
    drawDash();
    // Обновляем галочки в сетке пунктов
    buildExpPtGrid();
    buildExpCats(selExpPt);

  }catch(e){
    alert('Ошибка: '+e.message);
  }finally{
    btn.disabled=false;btn.textContent='Сохранить';
  }
}

</script>
