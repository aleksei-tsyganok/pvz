  function renderExtraRank(pts, monthList){
    // Считаем по категориям, не по пунктам
    const catTotals={};
    pts.forEach(p=>{
      const allowed=ptCatSettings[p.id];
      EXTRA_V.forEach(cv=>{
        if(allowed!==undefined&&!allowed.includes(cv)) return;
        const mi=allInc.filter(e=>e.point_id===p.id&&monthList.some(m=>Number(m.month)===Number(e._month)&&Number(m.year)===Number(e._year))&&e.category===cv);
        const iM=mi.reduce((s,e)=>s+Number(e.amount),0);
        const tax=mi.filter(e=>!e.tax_exempt).reduce((s,e)=>s+Number(e.amount),0)*p.tax_rate;
        if(iM>0){
          if(!catTotals[cv]) catTotals[cv]=0;
          catTotals[cv]+=(iM-tax);
        }
      });
    });
    const sorted=Object.entries(catTotals).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1]);
    if(!sorted.length) return '<div style="color:var(--mu2);font-size:12px;padding:8px 0">Нет данных</div>';
    const max=sorted[0][1];
    return sorted.slice(0,7).map(([cv,net],i)=>{
      const cat=CATS.find(c=>c.v===cv);
      const label=cat?cat.l:cv;
      const pct=max?Math.round(net/max*100):0;
      return '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--b)">'+
        '<span style="font-size:10px;color:var(--mu2);width:14px;text-align:right">'+(i+1)+'</span>'+
        '<span style="font-size:12px;flex:1">'+label+'</span>'+
        '<div style="width:80px;height:3px;background:var(--bg4);border-radius:2px;overflow:hidden;flex-shrink:0">'+
          '<div style="width:'+pct+'%;height:100%;background:var(--gr);border-radius:2px"></div>'+
        '</div>'+
        '<span style="font-size:11px;font-weight:600;color:var(--gr);width:80px;text-align:right;flex-shrink:0">'+fmt(net)+'</span>'+
      '</div>';
    }).join('');
  }

  _rankChartIdx=0; // сбрасываем счётчик canvas id при каждом рендере
  const pm1=[{month:pm,year:py}];
  const {top:top1m,bottom:bot1m}=topBottom(v,pm1);
  const {top:top3m,bottom:bot3m}=topBottom(v,months3);

  // Данные для графика за всё время
  const monthSet=new Set();
  [...allInc,...allExp].forEach(e=>{if(e._year&&e._month)monthSet.add(e._year+'-'+String(e._month).padStart(2,'0'));});
  const sortedMonths=Array.from(monthSet).sort();
  const MNS2=['Янв','Фев','Мар','Апр','Май','Июн','Июл','Авг','Сен','Окт','Ноя','Дек'];
  const chartLabels=sortedMonths.map(k=>{const[y,m]=k.split('-');return MNS2[parseInt(m)-1]+' '+y.slice(2);});
  const chartInc=[],chartNet=[];
  sortedMonths.forEach(key=>{
    const[yr,mo]=key.split('-').map(Number);
    let inc=0,ex=0,tax=0;
    v.forEach(p=>{
      const allowed=ptCatSettings[p.id];
      const mi=allInc.filter(e=>e.point_id===p.id&&Number(e._year)===yr&&Number(e._month)===mo&&(allowed===undefined||BASE_CATS.includes(e.category)||allowed.includes(e.category)));

      inc+=mi.reduce((s,e)=>s+Number(e.amount),0);
      ex+=mx.reduce((s,e)=>s+Number(e.amount),0);
      tax+=mi.filter(e=>!e.tax_exempt).reduce((s,e)=>s+Number(e.amount),0)*p.tax_rate;
    });
    chartInc.push(Math.round(inc));
    chartNet.push(Math.round(inc-ex-tax));
  });
  window._homeChartData={chartLabels,chartInc,chartNet};

  function card(title, content){
    return '<div style="background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:14px 16px">'+
      '<div style="font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">'+title+'</div>'+
      content+
    '</div>';
  }

  const s1='<div style="font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">';
  const s2='</div>';
  const grid1='<div style="display:grid;grid-template-columns:1fr;gap:12px;margin-bottom:20px">';
  const grid='<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">';
  return (
    '<div style="background:var(--bg2);border:1px solid var(--b);border-radius:12px;padding:16px;margin-bottom:20px">'+
      '<div style="font-size:11px;font-weight:600;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Доход и прибыль за всё время</div>'+
      '<div style="position:relative;height:200px"><canvas id="chart-home-main"></canvas></div>'+
    '</div>'+
    s1+pmLabel+' · '+m3Label+s2+
    grid+
      card('📊 '+pmLabel, renderRank(v,pm1))+
      card('📊 '+m3Label, renderRank(v,months3))+
    s2+
    s1+'Прибыль по группам'+s2+
    grid+
      card('📊 '+pmLabel, renderGroupRank(v,pm1))+
      card('📊 '+m3Label, renderGroupRank(v,months3))+
    s2+
    s1+'Топ допов'+s2+
    grid+
      card('За прошлый месяц · '+pmLabel,renderExtraRank(v,pm1))+
      card('За 3 месяца · '+m3Label,renderExtraRank(v,months3))+
    s2
  );
}

function renderMultiMonthViewAll(v){
  // Берём все уникальные месяцы из базы и считаем суммарно через renderMultiMonthView
  const monthSet=new Set();
  [...allInc,...allExp].forEach(e=>{
    if(e._year&&e._month) monthSet.add(e._year+'-'+String(e._month).padStart(2,'0'));
  });
  const n=monthSet.size||1;
  return renderMultiMonthView(v,n);
}

function renderHomeCharts(){
  const d=window._homeChartData;
  if(!d)return;
  if(window._homeCharts){window._homeCharts.forEach(c=>c.destroy());}
  window._homeCharts=[];
  const fR=v=>(v<0?'-':'')+new Intl.NumberFormat('ru-RU').format(Math.abs(Math.round(v)))+'\u202f\u20bd';

  const elMain=document.getElementById('chart-home-main');
  if(elMain) window._homeCharts.push(new Chart(elMain,{
    type:'bar',
    data:{labels:d.chartLabels,datasets:[
      {label:'Доход',data:d.chartInc,backgroundColor:'rgba(26,111,181,.5)',order:2},
      {label:'Прибыль',data:d.chartNet,type:'line',borderColor:'#2a9d4e',backgroundColor:'rgba(42,157,78,.08)',fill:true,tension:.3,pointRadius:2,order:1,
        segment:{borderColor:ctx=>ctx.p0.parsed.y<0||ctx.p1.parsed.y<0?'#c0392b':'#2a9d4e'}}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:true,position:'top',labels:{color:'#6a6864',font:{size:11},boxWidth:12}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fR(c.parsed.y)}}},
      scales:{y:{ticks:{color:'#6a6864',callback:v=>fR(v)},grid:{color:'rgba(255,255,255,.05)'}},x:{ticks:{color:'#6a6864',maxTicksLimit:12},grid:{display:false}}}
    }
  }));

  const n=document.getElementById('chart-home-net');
  if(n) window._homeCharts.push(new Chart(n,{type:'line',data:{labels:d.labels,datasets:[{label:'Прибыль',data:d.netSeries,borderColor:'#2a9d4e',backgroundColor:'rgba(42,157,78,.07)',fill:true,tension:.3,pointRadius:2,segment:{borderColor:ctx=>ctx.p0.parsed.y<0||ctx.p1.parsed.y<0?'#c0392b':'#2a9d4e'}}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fR(c.parsed.y)}}},scales:{y:{ticks:{color:'#6a6864',callback:v=>fR(v)},grid:{color:'rgba(255,255,255,.05)'}},x:{ticks:{color:'#6a6864',maxTicksLimit:12},grid:{display:false}}}}}));

  const ie=document.getElementById('chart-home-inc');
  if(ie) window._homeCharts.push(new Chart(ie,{type:'bar',data:{labels:d.labels,datasets:[{label:'Доход',data:d.incSeries,backgroundColor:'rgba(42,157,78,.55)'},{label:'Расход',data:d.expSeries.map(v=>-v),backgroundColor:'rgba(106,104,100,.35)'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+': '+fR(Math.abs(c.parsed.y))}}},scales:{y:{ticks:{color:'#6a6864',callback:v=>fR(v)},grid:{color:'rgba(255,255,255,.05)'}},x:{ticks:{color:'#6a6864',maxTicksLimit:12},grid:{display:false}}}}}));

  const gr=document.getElementById('chart-home-grp');
  if(gr) window._homeCharts.push(new Chart(gr,{type:'doughnut',data:{labels:['А','А+Д','ЯМ'],datasets:[{data:[Math.round(d.grpTotals.A),Math.round(d.grpTotals.AD),Math.round(d.grpTotals.YM)],backgroundColor:['#8e44c7','#3a9fbf','#b8960a'],borderWidth:0}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'bottom',labels:{color:'#6a6864',font:{size:11}}},tooltip:{callbacks:{label:c=>c.label+': '+fR(c.parsed)}}}}}));

  const pt=document.getElementById('chart-home-pts');
  if(pt) window._homeCharts.push(new Chart(pt,{type:'bar',data:{labels:d.ptTotals.map(p=>p.name),datasets:[{data:d.ptTotals.map(p=>Math.round(p.net)),backgroundColor:d.ptTotals.map(p=>p.net>=0?'rgba(42,157,78,.65)':'rgba(192,57,43,.65)')}]},options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>fR(c.parsed.x)}}},scales:{x:{ticks:{color:'#6a6864',callback:v=>fR(v)},grid:{color:'rgba(255,255,255,.05)'}},y:{ticks:{color:'#d4d2cc',font:{size:11}},grid:{display:false}}}}}));
}
